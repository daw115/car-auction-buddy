name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Check server imports in client code
        run: node scripts/check-server-imports.mjs

      - name: Build
        id: build
        run: |
          bun run build 2>&1 | tee /tmp/build-output.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Parse import-protection errors
        if: steps.build.outcome == 'failure'
        run: node scripts/parse-build-errors.mjs /tmp/build-output.log

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

  reports-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/reports-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/reports-api/requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint and format check
        run: |
          ruff check .
          ruff format --check .

      - name: Test Reports API
        run: python -m pytest -q

      - name: Build and inspect container
        run: |
          docker build -t car-auction-reports-api:ci .
          docker run --rm \
            --entrypoint sh \
            -e SUPABASE_URL=https://example.supabase.co \
            -e SUPABASE_SERVICE_ROLE_KEY=test-service-role-key \
            -e REPORTS_API_KEY=test-api-key-with-at-least-32-characters \
            car-auction-reports-api:ci \
            -c 'test "$(id -u)" -ne 0 && python -c "import main"'
